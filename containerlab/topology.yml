name: sdn-network

topology:
  nodes:
    router1:
      kind: linux
      image: alpine:latest
    router2:
      kind: linux
      image: alpine:latest
    switch1:
      kind: linux
      image: alpine:latest

  links:
    -  endpoints: ["router1:eth1", "switch1:eth1"]
    -  endpoints: ["router2:eth1", "switch1:eth2"]
  
